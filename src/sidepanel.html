<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NoServer.ai - On-device Web Summarizer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />
  </head>
  <body>
    <header class="panel-header" role="banner">
      <h1 class="panel-title">NoServer.ai</h1>
      <p class="panel-subtitle">On-device Web Summarizer</p>
    </header>

    <main class="panel-main" role="main">
      <section id="inputContainer" class="input-section" aria-label="요약 실행">
        <button type="button" id="extract-button" class="btn-primary" aria-label="현재 페이지 요약하기">
          <i class="fa fa-file-lines" aria-hidden="true"></i>
          <span>페이지 요약하기</span>
        </button>
      </section>

      <section id="loadingContainerWrapper" class="loading-section" aria-live="polite" aria-busy="true">
        <p id="model-status-text" class="model-status-text">AI 모델 준비 중입니다...</p>
        <div id="loadingContainer" class="loading-bar-container" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
      </section>

      <section id="stage" class="stage-section" aria-hidden="true">
        <div id="loading-indicator" class="loading-dots" aria-hidden="true"></div>
      </section>

      <section id="historyWrapper" class="history-section" aria-label="요약 히스토리">
        <!-- 요약 히스토리 카드들이 여기에 추가됨 -->
      </section>
    </main>

    <script type="module" src="./sidepanel.ts"></script>
  </body>
</html>
